              $ref: '#/components/schemas/ActorRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ActorRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
          description: ''
