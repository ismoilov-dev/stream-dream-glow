        language:
          type: string
          maxLength: 10
        language_name:
          type: string
          maxLength: 50
        file:
          type: string
          format: uri
          nullable: true
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - language
      - video_file
