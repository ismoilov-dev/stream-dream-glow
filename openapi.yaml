components:
  schemas:
    Actor:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 150
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        biography:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        photo:
          type: string
          format: uri
          nullable: true
      required:
      - full_name
      - id
      - slug
    ActorRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 150
        biography:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        photo:
          type: string
          format: binary
          nullable: true
      required:
      - full_name
    AgeRatingEnum:
      enum:
      - G
      - PG
      - PG-13
      - R
      - NC-17
      type: string
      description: |-
        * `G` - G — Hammabop
        * `PG` - PG — Ota-ona nazorati tavsiya etiladi
        * `PG-13` - PG-13 — 13+
        * `R` - R — 17+
        * `NC-17` - NC-17 — 18+
