openapi: 3.0.3
info:
  title: StreamPlay API
  version: 1.0.0
  description: |-
    Video on Demand (VOD) platformasi uchun REST API.

    **Xususiyatlari:**
    - Filmlar, seriallar, epizodlar
    - Obuna tizimi (SVOD)
    - Ko'rish tarixi va progress
    - Qidiruv va tavsiyalar
    - Chunked fayl yuklash
    - JWT autentifikatsiya
paths:
  /api/actors/:
    get:
      operationId: actors_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - actors
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActorList'
          description: ''
    post:
      operationId: actors_create
      tags:
      - actors
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
          application/x-www-form-urlencoded:
